name: Daily GitHub Trending

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trending:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run tracking pipeline
        run: node scripts/main.js
        env:
          DATA_DIR: ./data
          REPORT_DIR: ./reports
      - name: Commit via API
        run: node scripts/commit-api.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
